version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mesa_ayuda_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mesa_de_ayuda
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: mesa_user
      MYSQL_PASSWORD: mesa_pass123
      LANG: C.UTF-8
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mesa_ayuda_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: mesa_de_ayuda
      DB_USERNAME: mesa_user
      DB_PASSWORD: mesa_pass123
    ports:
      - "8080:8080"

volumes:
  mysql_data: