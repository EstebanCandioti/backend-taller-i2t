# ═══════════════════════════════════════════════════════════════════
# CONFIGURACIÓN - Sistema de Gestión IT - Mesa de Ayuda
# Poder Judicial Provincial
# ═══════════════════════════════════════════════════════════════════

# ── Servidor ───────────────────────────────────────────────────────
server.port=8080
spring.application.name=mesadeayuda

# ── Base de Datos (MySQL 8.0+) ────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/mesa_de_ayuda?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Jackson (JSON) ────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Argentina/Buenos_Aires

# ── JWT ────────────────────────────────────────────────────────────
# Clave secreta para firmar tokens (cambiar en producción)
jwt.secret=MesaDeAyudaPoderJudicialProvincial2025SecretKeyMuyLargaParaHS256
# Expiración: 8 horas (en milisegundos) = 28800000
jwt.expiration=28800000

# ── Email (SMTP) ──────────────────────────────────────────────────
# Para Gmail:
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TU_EMAIL_AQUI@gmail.com
spring.mail.password=TU_APP_PASSWORD_AQUI
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Para Outlook (descomentar y comentar las líneas de Gmail):
# spring.mail.host=smtp.office365.com
# spring.mail.port=587
# spring.mail.username=TU_EMAIL_AQUI@outlook.com
# spring.mail.password=TU_PASSWORD_AQUI

# Remitente por defecto
app.mail.from=mesadeayuda@judicial.gob.ar

# ── Scheduling (Job diario de alertas) ────────────────────────────
spring.task.scheduling.pool.size=2

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.judicial.mesadeayuda=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG